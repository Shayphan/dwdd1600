    <!--start the main content-->
    <main>
        <h1>Sign Up to Animotion</h1>
          <form method="get" class="myform" action="thanks.html">

<fieldset>
    <legend>About You</legend>
<label>First Name <input type="text" name="fname" required></label>
<label>Last Name <input type="text" name="lname" required></label>
<label>Email <input type="email" name="email" required></label>
<label>Phone <input type="tel" name="phone" required placeholder="800-555-5555"></label>
</fieldset>

<fieldset>
<legend>Select Your Experience Level</legend>
<label><input type="radio" name="method" value="Complete Novice">Complete Novice</label>
<label><input type="radio" name="method" value="Hobbyist">Hobbyist</label>
<label><input type="radio" name="method" value="Intermediate Animator">Intermediate Animator</label>
<label><input type="radio" name="method" value="Industry Professional">Industry Professional</label>
</fieldset>

<fieldset>
<legend>Select Your Focus</legend>
<label><input type="checkbox" name="Motion Graphic" value="chosen"> Motion Graphics</label>
<label><input type="checkbox" name="Motion Graphic" value="chosen"> UI/UX Motion</label>
<label><input type="checkbox" name="Motion Graphic" value="chosen"> 2D Animation</label>
<label><input type="checkbox" name="Motion Graphic" value="chosen"> 3D Animation</label>
<label><input type="checkbox" name="Motion Graphic" value="chosen"> Cell / Traditional Animation</label>
</fieldset>


<fieldset>
<legend>How'd You Hear About Us?</legend>
<label><select name="Hear">
<option value="none">Please Select</option>
<option value="tiktok">TikTok</option>
<option value="instagram">Instagram</option>
<option value="Youtube">Youtube</option>
<option value="friends or fam">Word of mouth / Friends</option>
<option value="Google search">Google Search</option>
<option value="other">Other</option>
</select></label>
</fieldset>

<label>What is your biggest roadblock in animation right now?

    <textarea name="comments" placeholder="e.g, smooth transitions, rigging "></textarea>
</label>




            <input type="submit" value="Sign Up">
          </form>
